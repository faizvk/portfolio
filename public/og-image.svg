<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="og-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAFAF7"/>
      <stop offset="100%" stop-color="#EEFBC9"/>
    </linearGradient>
    <pattern id="og-grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#000" stroke-width="1" opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#og-bg)"/>
  <rect width="1200" height="630" fill="url(#og-grid)"/>

  <!-- top-left brand chip -->
  <g transform="translate(80,80)">
    <rect x="0" y="0" width="120" height="60" rx="14" fill="#C5F542" stroke="#000" stroke-width="4"/>
    <text x="60" y="44" text-anchor="middle" font-family="Geist, system-ui, sans-serif" font-weight="900" font-size="38" fill="#000" letter-spacing="-2">FZ.</text>
  </g>

  <!-- status pill -->
  <g transform="translate(220,82)">
    <rect x="0" y="0" width="280" height="56" rx="28" fill="#fff" stroke="#000" stroke-width="3"/>
    <circle cx="32" cy="28" r="7" fill="#000"/>
    <text x="56" y="36" font-family="Geist Mono, monospace" font-weight="700" font-size="16" fill="#000" letter-spacing="3">SOFTWARE ENGINEER</text>
  </g>

  <!-- big name -->
  <text x="80" y="320" font-family="Geist, system-ui, sans-serif" font-weight="900" font-size="160" fill="#000" letter-spacing="-8">FAIZ</text>
  <text x="80" y="470" font-family="Geist, system-ui, sans-serif" font-weight="900" font-size="160" fill="#000" letter-spacing="-8">ZUBAIR<tspan fill="#9BC91F">.</tspan></text>

  <!-- subline -->
  <text x="80" y="540" font-family="Geist, system-ui, sans-serif" font-weight="600" font-size="26" fill="#000" opacity="0.7">Full-stack · CI/CD · Cloud infrastructure</text>

  <!-- bottom row -->
  <g transform="translate(80,580)">
    <text font-family="Geist Mono, monospace" font-weight="700" font-size="16" fill="#000" letter-spacing="3" opacity="0.55">@ SYNUP · KERALA, IN · @FAIZVK</text>
  </g>

  <!-- decorative lime block right -->
  <g transform="translate(820,180)">
    <rect x="0" y="0" width="300" height="300" rx="32" fill="#C5F542" stroke="#000" stroke-width="6"/>
    <text x="150" y="180" text-anchor="middle" font-family="Geist, system-ui, sans-serif" font-weight="900" font-size="200" fill="#000" letter-spacing="-10">FZ</text>
  </g>
</svg>
