<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sc-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>
    <linearGradient id="sc-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <pattern id="sc-grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="800" height="500" fill="url(#sc-bg)"/>
  <rect width="800" height="500" fill="url(#sc-grid)"/>

  <!-- chain blocks -->
  <g transform="translate(530,160)" stroke="#ffffff" stroke-width="2.5" fill="none">
    <rect x="0" y="0" width="60" height="60" rx="10" stroke-opacity="0.9"/>
    <rect x="80" y="40" width="60" height="60" rx="10" stroke-opacity="0.65"/>
    <rect x="0" y="80" width="60" height="60" rx="10" stroke-opacity="0.45"/>
    <rect x="80" y="120" width="60" height="60" rx="10" stroke-opacity="0.3"/>
    <line x1="60" y1="30" x2="80" y2="70" stroke-opacity="0.5"/>
    <line x1="60" y1="110" x2="80" y2="150" stroke-opacity="0.4"/>
    <line x1="30" y1="60" x2="30" y2="80" stroke-opacity="0.5"/>
    <line x1="110" y1="100" x2="110" y2="120" stroke-opacity="0.4"/>
  </g>
  <g transform="translate(560,190)" fill="#ffffff" opacity="0.9">
    <circle r="4"/>
  </g>

  <!-- wordmark -->
  <g font-family="Geist, system-ui, sans-serif">
    <text x="60" y="210" font-size="92" font-weight="900" fill="url(#sc-accent)" letter-spacing="-3">SmartChain</text>
    <text x="64" y="260" font-size="20" font-weight="700" fill="#cbd5e1" letter-spacing="3" text-transform="uppercase" opacity="0.7">BLOCKCHAIN E-TENDERING</text>
    <g transform="translate(60,310)" font-weight="800" font-size="13" fill="#fff">
      <rect x="0" y="0" width="110" height="34" rx="17" fill="#ffffff" fill-opacity="0.1" stroke="#fff" stroke-width="1.5"/>
      <text x="55" y="22" letter-spacing="2" text-anchor="middle">SOLIDITY</text>
      <rect x="125" y="0" width="100" height="34" rx="17" fill="#ffffff" fill-opacity="0.1" stroke="#fff" stroke-width="1.5"/>
      <text x="175" y="22" letter-spacing="2" text-anchor="middle">HARDHAT</text>
      <rect x="240" y="0" width="80" height="34" rx="17" fill="#ffffff" fill-opacity="0.1" stroke="#fff" stroke-width="1.5"/>
      <text x="280" y="22" letter-spacing="2" text-anchor="middle">IPFS</text>
    </g>
  </g>
</svg>
