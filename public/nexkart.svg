<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="nx-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="50%" stop-color="#c7d2fe"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="nx-text" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="nx-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#4f46e5" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#nx-bg)"/>

  <!-- decorative grid -->
  <g opacity="0.18" stroke="#4f46e5" stroke-width="1">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="500" y1="0" x2="500" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="700" y1="0" x2="700" y2="500"/>
  </g>

  <!-- shopping bag illustration -->
  <g transform="translate(540,140)" filter="url(#nx-shadow)">
    <rect x="0" y="60" width="180" height="200" rx="20" fill="#4f46e5"/>
    <path d="M 50 60 Q 50 10 90 10 Q 130 10 130 60" fill="none" stroke="#1e1b4b" stroke-width="10" stroke-linecap="round"/>
    <circle cx="60" cy="120" r="6" fill="#fde047"/>
    <circle cx="120" cy="120" r="6" fill="#fde047"/>
    <rect x="40" y="180" width="100" height="8" rx="4" fill="#a78bfa"/>
    <rect x="40" y="200" width="60" height="8" rx="4" fill="#a78bfa"/>
  </g>

  <!-- wordmark -->
  <g font-family="Geist, system-ui, sans-serif">
    <text x="60" y="220" font-size="92" font-weight="900" fill="url(#nx-text)" letter-spacing="-3">NexKart</text>
    <text x="64" y="270" font-size="20" font-weight="700" fill="#4338ca" letter-spacing="2" text-transform="uppercase">FULL-STACK E-COMMERCE</text>
    <g transform="translate(60,310)">
      <rect x="0" y="0" width="100" height="34" rx="17" fill="#4f46e5"/>
      <text x="50" y="22" font-size="13" font-weight="800" fill="#fff" letter-spacing="2" text-anchor="middle">MERN</text>
      <rect x="115" y="0" width="120" height="34" rx="17" fill="#7c3aed"/>
      <text x="175" y="22" font-size="13" font-weight="800" fill="#fff" letter-spacing="2" text-anchor="middle">RAZORPAY</text>
      <rect x="250" y="0" width="90" height="34" rx="17" fill="#1e1b4b"/>
      <text x="295" y="22" font-size="13" font-weight="800" fill="#fff" letter-spacing="2" text-anchor="middle">REDIS</text>
    </g>
  </g>
</svg>
