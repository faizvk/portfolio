<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="pa-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#043873"/>
      <stop offset="100%" stop-color="#0a4d9e"/>
    </linearGradient>
    <radialGradient id="pa-glow" cx="0.75" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#4f9cf9" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#4f9cf9" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#pa-bg)"/>
  <rect width="800" height="500" fill="url(#pa-glow)"/>

  <!-- abstract AI orbit -->
  <g transform="translate(580,250)" opacity="0.95">
    <circle cx="0" cy="0" r="120" fill="none" stroke="#4f9cf9" stroke-width="2" stroke-dasharray="4 8" opacity="0.6"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#ffe492" stroke-width="2" opacity="0.7"/>
    <circle cx="0" cy="0" r="50" fill="#4f9cf9"/>
    <circle cx="0" cy="0" r="30" fill="#ffe492"/>
    <circle cx="120" cy="0" r="8" fill="#ffe492"/>
    <circle cx="-85" cy="-85" r="6" fill="#fff"/>
    <circle cx="0" cy="-120" r="5" fill="#4f9cf9"/>
  </g>

  <!-- prompt window mock -->
  <g transform="translate(60,330)">
    <rect x="0" y="0" width="360" height="100" rx="16" fill="#0a2547" stroke="#4f9cf9" stroke-width="1.5"/>
    <circle cx="20" cy="20" r="5" fill="#ff5f56"/>
    <circle cx="36" cy="20" r="5" fill="#ffbd2e"/>
    <circle cx="52" cy="20" r="5" fill="#27c93f"/>
    <rect x="20" y="42" width="240" height="10" rx="5" fill="#4f9cf9" opacity="0.6"/>
    <rect x="20" y="60" width="180" height="10" rx="5" fill="#4f9cf9" opacity="0.35"/>
    <rect x="20" y="78" width="120" height="10" rx="5" fill="#ffe492" opacity="0.8"/>
  </g>

  <!-- wordmark -->
  <g font-family="Geist, system-ui, sans-serif">
    <text x="60" y="160" font-size="80" font-weight="900" fill="#ffffff" letter-spacing="-3">Promptive</text>
    <text x="60" y="235" font-size="80" font-weight="900" fill="#ffe492" letter-spacing="-3">AI<tspan fill="#4f9cf9">.</tspan></text>
    <text x="64" y="285" font-size="18" font-weight="700" fill="#4f9cf9" letter-spacing="3" text-transform="uppercase">MULTI-MODEL AI SAAS</text>
  </g>
</svg>
