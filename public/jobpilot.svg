<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="jp-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fafbfc"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="jp-text" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <radialGradient id="jp-glow" cx="0.2" cy="0.85" r="0.6">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <pattern id="jp-dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#6366f1" fill-opacity="0.18"/>
    </pattern>
  </defs>
  <rect width="800" height="500" fill="url(#jp-bg)"/>
  <rect width="800" height="500" fill="url(#jp-dots)"/>
  <rect width="800" height="500" fill="url(#jp-glow)"/>

  <!-- dark sidebar slice -->
  <rect x="0" y="0" width="120" height="500" fill="#0f172a"/>
  <g transform="translate(60,90)">
    <rect x="-30" y="-30" width="60" height="60" rx="14" fill="url(#jp-text)"/>
    <text x="0" y="6" font-family="Geist, system-ui, sans-serif" font-size="32" font-weight="900" fill="#fff" text-anchor="middle">JP</text>
  </g>
  <g fill="#94a3b8">
    <rect x="40" y="180" width="40" height="8" rx="4" opacity="0.5"/>
    <rect x="40" y="210" width="40" height="8" rx="4" opacity="0.8"/>
    <rect x="40" y="240" width="40" height="8" rx="4" opacity="0.5"/>
    <rect x="40" y="270" width="40" height="8" rx="4" opacity="0.5"/>
  </g>

  <!-- kanban mock -->
  <g transform="translate(170,310)">
    <rect x="0" y="0" width="120" height="140" rx="14" fill="#ffffff" stroke="#e0e7ff" stroke-width="2"/>
    <rect x="12" y="14" width="50" height="8" rx="4" fill="#6366f1"/>
    <rect x="12" y="34" width="96" height="36" rx="8" fill="#eef2ff"/>
    <rect x="12" y="78" width="96" height="36" rx="8" fill="#eef2ff"/>

    <rect x="140" y="0" width="120" height="140" rx="14" fill="#ffffff" stroke="#e0e7ff" stroke-width="2"/>
    <rect x="152" y="14" width="50" height="8" rx="4" fill="#8b5cf6"/>
    <rect x="152" y="34" width="96" height="36" rx="8" fill="#f3e8ff"/>

    <rect x="280" y="0" width="120" height="140" rx="14" fill="#ffffff" stroke="#e0e7ff" stroke-width="2"/>
    <rect x="292" y="14" width="50" height="8" rx="4" fill="#a855f7"/>
    <rect x="292" y="34" width="96" height="36" rx="8" fill="#fae8ff"/>
  </g>

  <!-- wordmark -->
  <g font-family="Geist, system-ui, sans-serif">
    <text x="170" y="160" font-size="90" font-weight="900" fill="url(#jp-text)" letter-spacing="-4">JobPilot</text>
    <text x="174" y="220" font-size="22" font-weight="700" fill="#475569" letter-spacing="3" text-transform="uppercase">AI APPLICATION ASSISTANT</text>
    <g transform="translate(170,250)">
      <rect x="0" y="0" width="14" height="14" rx="7" fill="#22c55e"/>
      <text x="22" y="12" font-size="14" font-weight="700" fill="#0f172a">pursuits.in</text>
    </g>
  </g>
</svg>
