<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="pu-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ECFDF5"/>
      <stop offset="55%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="pu-emerald" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <filter id="pu-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#059669" flood-opacity="0.16"/>
    </filter>
  </defs>

  <!-- Background + soft emerald top wash -->
  <rect width="800" height="500" fill="url(#pu-bg)"/>

  <!-- Top-left brand chip (Pursuit) -->
  <g transform="translate(60,52)">
    <rect x="0" y="0" width="40" height="40" rx="10" fill="url(#pu-emerald)"/>
    <path d="M 11 21 L 18 28 L 30 13" stroke="#fff" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="52" y="27" font-family="Geist, system-ui, sans-serif" font-size="22" font-weight="700" fill="#0F172A" letter-spacing="-0.5">Pursuit</text>
  </g>

  <!-- Marketing nav lozenges -->
  <g transform="translate(560,60)" font-family="Geist Mono, monospace" font-size="11" font-weight="700">
    <rect x="0" y="0" width="80" height="26" rx="13" fill="#fff" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="40" y="17" text-anchor="middle" fill="#059669" letter-spacing="1">HOME</text>
    <rect x="92" y="0" width="88" height="26" rx="13" fill="#059669"/>
    <text x="136" y="17" text-anchor="middle" fill="#fff" letter-spacing="1">SIGN UP →</text>
  </g>

  <!-- Hero headline -->
  <g font-family="Geist, system-ui, sans-serif">
    <text x="60" y="200" font-size="56" font-weight="800" fill="#0F172A" letter-spacing="-2.5">Your next job</text>
    <text x="60" y="258" font-size="56" font-weight="800" fill="url(#pu-emerald)" letter-spacing="-2.5">starts here<tspan fill="#0F172A">.</tspan></text>
    <text x="60" y="290" font-size="14" font-weight="500" fill="#64748B" letter-spacing="-0.2">3 hours of job hunting → under 30 minutes.</text>
  </g>

  <!-- Search bar mock (key UI of the redesigned home) -->
  <g transform="translate(60,320)" filter="url(#pu-shadow)">
    <rect x="0" y="0" width="540" height="56" rx="14" fill="#fff" stroke="#E2E8F0" stroke-width="1.5"/>
    <circle cx="26" cy="28" r="8" fill="none" stroke="#94A3B8" stroke-width="2"/>
    <line x1="32" y1="34" x2="38" y2="40" stroke="#94A3B8" stroke-width="2" stroke-linecap="round"/>
    <text x="56" y="34" font-family="Geist, system-ui, sans-serif" font-size="14" font-weight="500" fill="#64748B">Search "Frontend Developer" — Bangalore</text>
    <rect x="430" y="10" width="98" height="36" rx="10" fill="url(#pu-emerald)"/>
    <text x="479" y="33" font-family="Geist, system-ui, sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">Find jobs</text>
  </g>

  <!-- Role pills -->
  <g transform="translate(60,410)" font-family="Geist Mono, monospace" font-size="11" font-weight="700">
    <g>
      <rect x="0" y="0" width="170" height="32" rx="16" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1.5"/>
      <circle cx="14" cy="16" r="4" fill="#059669"/>
      <text x="26" y="20" fill="#065F46" letter-spacing="0.5">SOFTWARE ENG · ₹8.7L</text>
    </g>
    <g transform="translate(184,0)">
      <rect x="0" y="0" width="166" height="32" rx="16" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1.5"/>
      <circle cx="14" cy="16" r="4" fill="#059669"/>
      <text x="26" y="20" fill="#065F46" letter-spacing="0.5">DEVOPS ENG · ₹9.3L</text>
    </g>
    <g transform="translate(360,0)">
      <rect x="0" y="0" width="166" height="32" rx="16" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1.5"/>
      <circle cx="14" cy="16" r="4" fill="#059669"/>
      <text x="26" y="20" fill="#065F46" letter-spacing="0.5">ML / AI ENG · ₹11.5L</text>
    </g>
  </g>

  <!-- Live URL badge bottom-right -->
  <g transform="translate(640,440)">
    <rect x="0" y="0" width="100" height="32" rx="16" fill="#0F172A"/>
    <circle cx="16" cy="16" r="4" fill="#10B981"/>
    <text x="28" y="20" font-family="Geist Mono, monospace" font-size="11" font-weight="700" fill="#10B981" letter-spacing="0.8">pursuits.in</text>
  </g>
</svg>
